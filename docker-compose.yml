services:
  api:
    build: .
    container_name: bookkeeping-api
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  web:
    build: ./frontend
    container_name: bookkeeping-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=http://api:3000
    restart: unless-stopped
