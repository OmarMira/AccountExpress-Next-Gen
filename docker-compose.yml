services:
  caddy:
    image: caddy:2
    container_name: caddy
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP redirige a HTTPS
      - "8443:8443"   # HTTPS
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

  api:
    build: .
    container_name: bookkeeping-api
    expose:
      - "3000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    restart: unless-stopped

  web:
    build: ./frontend
    container_name: bookkeeping-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    environment:
      - VITE_API_URL=https://localhost:8443/api
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
